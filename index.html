<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Radio Globe Pro</title>

<style>
  body { margin:0; overflow:hidden; background:#000; font-family:Arial; }

  #info {
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    color:#fff;
    padding:10px;
    border-radius:8px;
    z-index:10;
  }

  #player {
    position:absolute;
    bottom:10px;
    left:10px;
    z-index:10;
  }
</style>
</head>

<body>

<div id="info">🌍 Carregando rádios...</div>
<audio id="player" controls></audio>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
// ===== CENA =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth/window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== GLOBO REAL =====
const texture = new THREE.TextureLoader().load(
  "https://threejs.org/examples/textures/land_ocean_ice_cloud_2048.jpg"
);

const globe = new THREE.Mesh(
  new THREE.SphereGeometry(5, 64, 64),
  new THREE.MeshStandardMaterial({ map: texture })
);

scene.add(globe);

// ===== LUZ =====
const light = new THREE.PointLight(0xffffff, 2);
light.position.set(10,10,10);
scene.add(light);

const ambient = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambient);

// ===== CAMERA =====
camera.position.z = 12;

// ===== DADOS =====
let radios = [];
let points = [];

// ===== CONVERSÃO LAT/LON =====
function latLongToVector3(lat, lon, radius){
  const phi = (90 - lat) * (Math.PI/180);
  const theta = (lon + 180) * (Math.PI/180);

  return new THREE.Vector3(
    -(radius * Math.sin(phi) * Math.cos(theta)),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// ===== CARREGAR RÁDIOS =====
async function carregarRadios(){

  const res = await fetch(
    "https://de1.api.radio-browser.info/json/stations/search?has_geo_info=true&limit=300"
  );

  radios = await res.json();

  radios.forEach((radio, i)=>{

    const lat = parseFloat(radio.latitude);
    const lon = parseFloat(radio.longitude);

    if(isNaN(lat) || isNaN(lon)) return;

    const pos = latLongToVector3(lat, lon, 5.3);

    // PONTO PRINCIPAL
    const point = new THREE.Mesh(
      new THREE.SphereGeometry(0.25,16,16),
      new THREE.MeshStandardMaterial({
        color:0x00ff00,
        emissive:0x00ff00,
        emissiveIntensity:1.5
      })
    );

    point.position.copy(pos);
    point.userData = { index:i };

    scene.add(point);
    points.push(point);

    // GLOW
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(0.4,16,16),
      new THREE.MeshBasicMaterial({
        color:0x00ff00,
        transparent:true,
        opacity:0.25
      })
    );

    glow.position.copy(pos);
    scene.add(glow);
  });

  document.getElementById("info").innerHTML =
    `🌍 ${points.length} rádios carregadas`;
}

carregarRadios();

// ===== CLIQUE =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click",(event)=>{

  mouse.x = (event.clientX/window.innerWidth)*2 -1;
  mouse.y = -(event.clientY/window.innerHeight)*2 +1;

  raycaster.setFromCamera(mouse,camera);

  const hits = raycaster.intersectObjects(points);

  if(hits.length > 0){

    const index = hits[0].object.userData.index;
    const radio = radios[index];

    document.getElementById("info").innerHTML =
      `<b>${radio.name}</b><br>${radio.country}`;

    // destaque
    points.forEach((p,i)=>{
      p.material.color.set(i===index ? 0xffff00 : 0x00ff00);
    });

    // player
    const player = document.getElementById("player");

    player.pause();
    player.src = radio.url_resolved;
    player.load();

    player.play().catch(()=>{
      document.getElementById("info").innerHTML +=
        "<br><small>Rádio bloqueada</small>";
    });
  }
});

// ===== ANIMAÇÃO =====
function animate(){
  requestAnimationFrame(animate);

  globe.rotation.y += 0.0015;

  renderer.render(scene,camera);
}

animate();

// ===== RESPONSIVO =====
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
