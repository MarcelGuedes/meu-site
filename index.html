  <section>

    <ul>
      <li>Programação em Python</li>
      <li>Desenvolvimento Web (HTML, CSS, JS)</li>
      <li>Git & GitHub</li>

  <footer>
    <p>© 2026 Marcel - Todos os direitos reservados</p>

</html>
