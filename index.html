<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <title>Globo com Rádios - Exemplo Simples</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    #info {
      position: absolute; top: 10px; left: 10px; color: #fff; background: rgba(0,0,0,0.7); padding: 8px; border-radius: 6px;
      font-family: sans-serif; z-index: 10;
    }
  </style>
</head>
<body>
<div id="info">Clique nos pontos verdes para ver o nome da rádio.</div>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
// Dados das rádios (exemplo)
const radios = [
  { nome: "Rádio Cidade", latitude: -23.55, longitude: -46.63 },
  { nome: "Radio Paris", latitude: 48.85, longitude: 2.35 },
  { nome: "Radio New York", latitude: 40.71, longitude: -74.00 }
];

// Cena, câmera e renderizador
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Globo (esfera)
const radius = 5;
const geometry = new THREE.SphereGeometry(radius, 32, 32);
const material = new THREE.MeshBasicMaterial({ color: 0x0077ff, wireframe: true });
const globe = new THREE.Mesh(geometry, material);
scene.add(globe);

// Função para converter lat/lon em coordenadas 3D
function latLongToVector3(lat, lon, radius) {
  var phi = (90 - lat) * (Math.PI / 180);
  var theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -(radius * Math.sin(phi) * Math.cos(theta)),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// Adiciona pontos das rádios
const radioPoints = [];
radios.forEach((radio, idx) => {
  const pos = latLongToVector3(radio.latitude, radio.longitude, radius + 0.2);
  const pointGeometry = new THREE.SphereGeometry(0.18, 8, 8);
  const pointMaterial = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
  const point = new THREE.Mesh(pointGeometry, pointMaterial);
  point.position.copy(pos);
  point.userData = { idx }; // Salva o índice para identificar depois
  scene.add(point);
  radioPoints.push(point);
});

// Câmera
camera.position.z = 13;

// Raycaster para detectar clique nos pontos
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener('click', function(event) {
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = - (event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const intersects = raycaster.intersectObjects(radioPoints);
  if (intersects.length > 0) {
    const idx = intersects[0].object.userData.idx;
    document.getElementById('info').innerHTML = `<b>${radios[idx].nome}</b>`;
    // Destaca o ponto clicado
    radioPoints.forEach((p,i) => p.material.color.set(i === idx ? 0xffff00 : 0x00ff00));
  }
});

// Animação simples (gira o globo)
function animate() {
  requestAnimationFrame(animate);
  globe.rotation.y += 0.002;
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
